name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  build-and-test:
    name: Build, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./app/package-lock.json

      - name: Install app dependencies
        working-directory: ./app
        run: npm ci

      - name: TypeScript type check
        working-directory: ./app
        run: npx tsc --noEmit

      - name: ESLint
        working-directory: ./app
        run: npm run lint

      - name: Prettier format check
        working-directory: ./app
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"

      - name: Vitest unit tests with coverage
        working-directory: ./app
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 14

      - name: Vite production build
        working-directory: ./app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: app/dist/
          retention-days: 7

      - name: npm security audit
        working-directory: ./app
        run: npm audit --audit-level=high

      - name: Install root dependencies
        run: npm install

      - name: Image size audit
        run: node scripts/check-images.js

      - name: SEO files check
        run: node scripts/check-seo-files.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Playwright E2E tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  lighthouse:
    name: Lighthouse CI
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: app/dist/

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        run: lhci autorun --collect.staticDistDir=app/dist --upload.target=temporary-public-storage
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 30
